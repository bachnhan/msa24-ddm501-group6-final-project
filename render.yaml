services:
  # ===========================================================================
  # 1. FastAPI Prediction API
  # ===========================================================================
  - type: web
    name: customer-churn-api
    runtime: docker
    plan: free
    region: singapore # Matches your timezone (VN/SE Asia)
    envVars:
      - key: METRICS_ENABLED
        value: "true"
      - key: MODEL_VERSION
        value: "1.0.0"
      - key: MLFLOW_TRACKING_URI
        value: "https://dagshub.com/nhannhb92/msa24-ddm501-group6-final-project.mlflow"
      - key: MLFLOW_TRACKING_USERNAME
        value: "nhannhb92"
      - key: MLFLOW_TRACKING_PASSWORD
        sync: false
      - key: MLFLOW_MODEL_NAME
        value: "CustomerChurnModel"
    healthCheckPath: /health

  # ===========================================================================
  # 2. Prometheus Monitoring
  # ===========================================================================
  - type: web
    name: customer-churn-prometheus
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./prometheus/Dockerfile
    dockerContext: .
    envVars:
      - key: RENDER_API_HOSTNAME
        fromService:
          name: customer-churn-api
          type: web
          property: host

  # ===========================================================================
  # 3. Grafana Dashboards
  # ===========================================================================
  - type: web
    name: customer-churn-grafana
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./grafana/Dockerfile
    dockerContext: .
    envVars:
      - key: GF_SECURITY_ADMIN_USER
        value: admin
      - key: GF_SECURITY_ADMIN_PASSWORD
        value: admin
      - key: GF_USERS_ALLOW_SIGN_UP
        value: "false"
      - key: PROMETHEUS_URL
        value: http://customer-churn-prometheus:9090

# =============================================================================
# Grafana Data Source Provisioning
# DDM501 - Final Project
#
# This file automatically configures Prometheus as a data source in Grafana.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: https://customer-churn-prometheus.onrender.com
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

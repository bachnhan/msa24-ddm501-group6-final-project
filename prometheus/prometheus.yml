# =============================================================================
# Prometheus Configuration
# DDM501 - Final Project
#
#
# Documentation: https://prometheus.io/docs/prometheus/latest/configuration/
# =============================================================================

global:
  # How frequently to scrape targets
  scrape_interval: 15s
  
  # How frequently to evaluate rules
  evaluation_interval: 15s

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - targets: ['alertmanager:9093']

# Rule files for alerting
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # ==========================================================================
  # 1. Prometheus Self-Monitoring (Optional)
  # ==========================================================================
  - job_name: 'monitoring-system'
    static_configs:
      - targets: ['${PROMETHEUS_TARGET:-localhost:9090}']

  # ==========================================================================
  # 2. Customer Churn API Metrics (Primary)
  # ==========================================================================
  - job_name: 'customer-churn-api'
    metrics_path: '/metrics'
    scheme: '${API_SCHEME}'
    static_configs:
      - targets: ['${API_TARGET}']
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: customer-churn-api

  # ==========================================================================
  # 3. Node Exporter (System Metrics)
  # ==========================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['${NODE_EXPORTER_TARGET:-node-exporter:9100}']

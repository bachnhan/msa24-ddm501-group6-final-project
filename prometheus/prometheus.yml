# =============================================================================
# Prometheus Configuration
# DDM501 - Final Project
#
#
# Documentation: https://prometheus.io/docs/prometheus/latest/configuration/
# =============================================================================

global:
  # How frequently to scrape targets
  scrape_interval: 15s
  
  # How frequently to evaluate rules
  evaluation_interval: 15s

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - targets: ['alertmanager:9093']

# Rule files for alerting
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # ==========================================================================
  # Prometheus self-monitoring
  # ==========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    
    # Labels added to all metrics from this job
    # relabel_configs:
    #   - source_labels: [__address__]
    #     target_label: instance
    #     replacement: prometheus

  # ==========================================================================
  # ==========================================================================
  # Requirements:
  # - Job name: 'customer-churn-api'
  # - Target: 'api:8000' (Docker service name)
  # - Metrics path: '/metrics'
  # - Scrape interval: 10s (more frequent than default)
  
  - job_name: 'customer-churn-api'
    metrics_path: '/metrics'
    scheme: 'http'
    static_configs:
      - targets: ['customer-churn-api:8000']
    scrape_interval: 10s
    
    # Relabeling to ensure consistent service label
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: customer-churn-api

  # ==========================================================================
  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Example: Docker metrics
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['docker-host:9323']

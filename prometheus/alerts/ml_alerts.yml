groups:
  - name: ml_alerts
    rules:
      - alert: ModelNotLoaded
        expr: ml_model_loaded == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Churn ML Model not loaded"
          description: "The Churn model is not loaded on the API server"
      
      - alert: PredictionAnomaly
        expr: |
          abs(
            histogram_quantile(0.5, rate(ml_prediction_value_bucket[5m])) -
            histogram_quantile(0.5, rate(ml_prediction_value_bucket[5m] offset 1h))
          ) > 0.2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Churn prediction distribution shift"
          description: "Median churn probability has shifted by > 0.2 in the last hour"
      
      - alert: HighPredictionLatency
        expr: |
          histogram_quantile(0.99, 
            rate(ml_prediction_duration_seconds_bucket[5m])
          ) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Slow ML Inference"
          description: "P99 prediction latency is {{ $value }}s (threshold: 0.1s)"
      
      - alert: ModelDriftPSI
        expr: ml_feature_psi > 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Model Drift detected (PSI > 0.20)"
          description: "Feature '{{ $labels.feature }}' has a PSI of {{ $value }} (threshold: 0.20)"

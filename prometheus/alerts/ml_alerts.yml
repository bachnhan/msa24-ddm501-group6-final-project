# =============================================================================
# ML-Specific Alerting Rules
# DDM501 - Lab 2: Monitoring & Production Deployment
#
#
# These alerts focus on machine learning specific concerns:
# - Model health
# - Prediction performance
# - Data drift indicators
# =============================================================================

groups:
  - name: ml_alerts
    rules:
      # ========================================================================
      # Trigger when the ML model is not loaded
      # Severity: critical
      
      - alert: ModelNotLoaded
        expr: ml_model_loaded == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ML Model not loaded"
          description: "The ML model is not loaded on the API server"
      
      # ========================================================================
      # Trigger when P95 prediction latency exceeds 100ms
      # Severity: warning
      
      - alert: PredictionLatencyHigh
        expr: |
          histogram_quantile(0.95, 
            rate(ml_prediction_duration_seconds_bucket[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML prediction latency is high"
          description: "P95 prediction latency is {{ $value }}s (threshold: 0.1s)"
      
      # ========================================================================
      # Trigger when prediction rate drops significantly
      # Could indicate service issues or traffic problems
      # Severity: warning
      
      - alert: LowPredictionVolume
        expr: rate(ml_predictions_total[5m]) < 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Low prediction volume"
          description: "Prediction rate is {{ $value }}/s, unusually low"
      
      # ========================================================================
      # Trigger when median prediction shifts significantly from historical
      # This is a simple drift detection mechanism
      # Severity: warning
      
      - alert: PredictionDistributionAnomaly
        expr: |
          abs(
            histogram_quantile(0.5, rate(ml_prediction_value_bucket[1h])) -
            histogram_quantile(0.5, rate(ml_prediction_value_bucket[1h] offset 24h))
          ) > 0.5
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Prediction distribution shift detected"
          description: "Median prediction has shifted by more than 0.5 in 24h"
      
      # ========================================================================
      # Trigger when prediction error rate is too high
      # Severity: critical
      
      - alert: HighPredictionErrorRate
        expr: |
          rate(ml_prediction_errors_total[5m]) 
          / rate(ml_predictions_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High prediction error rate"
          description: "{{ $value | humanizePercentage }} of predictions are failing"
      
      # ========================================================================
      # ========================================================================
      # Trigger when model hasn't been reloaded in a long time (e.g., 7 days)
      # Severity: info
      
      - alert: ModelStale
        expr: time() - ml_model_last_reload_timestamp > 604800
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "ML model may be stale"
          description: "Model hasn't been reloaded in {{ $value | humanizeDuration }}"
      
      # ========================================================================
      # Trigger when too many predictions are at extreme values (1 or 5)
      # Could indicate model issues
      # Severity: warning
      
      - alert: ExtremePredictionsHigh
        expr: |
          (
            rate(ml_prediction_value_bucket{le="1.5"}[1h]) +
            rate(ml_prediction_value_bucket{le="5.0"}[1h]) -
            rate(ml_prediction_value_bucket{le="4.5"}[1h])
          ) / rate(ml_prediction_value_count[1h]) > 0.3
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Too many extreme predictions"
          description: "More than 30% of predictions are at extreme values (1 or 5)"

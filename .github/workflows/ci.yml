name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint and Type Check
        run: |
          pip install flake8 black mypy
          # Format check
          black . --check
          # Lint
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Type check
          mypy app/ --ignore-missing-imports

      - name: Run Tests
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: |
          docker build -t churn-prediction-api:latest .

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger API Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Grafana Deploy
        run: curl -X POST ${{ secrets.RENDER_GRAFANA_HOOK_URL }}

      - name: Trigger Prometheus Deploy
        run: curl -X POST ${{ secrets.RENDER_PROMETHEUS_HOOK_URL }}

name: Continuous Training (MLOps)

on:
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:
  # Trigger on push to main branch when training scripts or data change
  push:
    branches:
      - main
    paths:
      - 'scripts/train_model.py'
      - 'requirements.txt'

jobs:
  train-and-register:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Training & Register to DagsHub
      env:
        # These secrets must be configured in GitHub Repo Settings
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        MLFLOW_MODEL_NAME: "CustomerChurnModel"
      run: |
        python scripts/train_model.py

<script>
const panels = {
  ibm: {
    title: 'IBM Telco dataset',
    body: 'The canonical churn dataset with <strong>7,043 customer records</strong> and 21 raw features including tenure, contract type, monthly charges, and service subscriptions. Target variable: <code>Churn</code> (binary). ~26% churn rate — class imbalance handled during preprocessing.',
    pills: ['CSV source', '21 features', '26% churn rate']
  },
  preprocess: {
    title: 'Preprocessing pipeline',
    body: '<strong>Null handling:</strong> TotalCharges has 11 missing values (converted from blank string) — imputed with median. <strong>One-Hot Encoding:</strong> applied to 16 categorical columns. <strong>StandardScaler:</strong> normalises numeric columns (tenure, MonthlyCharges, TotalCharges) to zero mean and unit variance.',
    pills: ['Null imputation', 'One-Hot Encoding', 'StandardScaler', 'Train/test split 80/20']
  },
  features: {
    title: 'Feature engineering',
    body: 'Derived features include <strong>charge-per-month ratio</strong>, <strong>service bundling score</strong> (count of active services), and <strong>contract risk tier</strong>. Final feature matrix has ~20 engineered + original numeric features after encoding and dropping redundant columns.',
    pills: ['Charge ratio', 'Bundle score', 'Contract tier', 'Feature selection']
  },
  training: {
    title: 'Model training',
    body: '<strong>Logistic Regression</strong> — baseline, L2 regularisation, max_iter=1000. <strong>Random Forest</strong> — 100 estimators, class_weight=balanced. <strong>XGBoost ★</strong> — selected champion: scale_pos_weight tuned for imbalance, early stopping, hyperparameter search via GridSearchCV (5-fold CV).',
    pills: ['Logistic Regression', 'Random Forest', 'XGBoost ★ champion', '5-fold CV', 'GridSearchCV']
  },
  mlflow: {
    title: 'MLflow experiment tracking',
    body: 'Each training run logs: <strong>parameters</strong> (model hyperparameters), <strong>metrics</strong> (AUC, Recall, F1, Precision), and <strong>artifacts</strong> (serialised model, feature importance plot, SHAP summary). UI accessible at <code>localhost:5000</code>. Enables reproducible comparison across all experiments.',
    pills: ['Params logging', 'Metrics logging', 'Artifact store', 'Run comparison']
  },
  registry: {
    title: 'Model registry',
    body: 'MLflow Model Registry stores <strong>Champion</strong> (currently deployed) and <strong>Challenger</strong> (candidate) model versions. Promotion requires passing the Validation Gate in CI/CD: AUC ≥ 0.85 and Recall ≥ 0.80 on a held-out validation set. Enables safe A/B rollout and instant rollback.',
    pills: ['Champion model', 'Challenger model', 'Version control', 'Rollback ready']
  },
  fastapi: {
    title: 'FastAPI gateway',
    body: 'Exposes <code>POST /predict</code> endpoint accepting JSON with customer feature fields. Validates input with <strong>Pydantic</strong> schemas, routes to the sklearn pipeline, and returns structured response. Also serves <code>GET /health</code> and <code>GET /metrics</code> (Prometheus scrape endpoint).',
    pills: ['POST /predict', 'GET /health', 'GET /metrics', 'Pydantic validation']
  },
  sklearn: {
    title: 'Scikit-learn pipeline',
    body: 'A serialised <code>Pipeline</code> object chains the preprocessing steps (imputer → encoder → scaler) directly with the model. Loaded once at startup and reused per request — ensures training/serving parity so no feature transformation drift can occur between training and inference.',
    pills: ['Training/serving parity', 'Serialised pickle', 'Imputer → Encoder → Scaler']
  },
  xgboost: {
    title: 'XGBoost champion model',
    body: 'Selected after systematic comparison. Outperforms Logistic Regression on Recall (+12pp) and Random Forest on inference latency (–40ms). Key hyperparameters: <strong>n_estimators=200, max_depth=5, learning_rate=0.05, scale_pos_weight≈2.9</strong>. Target metrics: ROC-AUC ≥ 0.85, Recall ≥ 0.80.',
    pills: ['n_estimators=200', 'max_depth=5', 'lr=0.05', 'scale_pos_weight=2.9']
  },
  shap: {
    title: 'SHAP explainability',
    body: 'Uses <code>shap.TreeExplainer</code> for fast exact SHAP values on tree models. Per-prediction <strong>reason_codes</strong> identify top 3 features driving the churn score (e.g. "high monthly charges", "month-to-month contract"). Summary plots generated for model validation and stakeholder reporting.',
    pills: ['TreeExplainer', 'Per-prediction reasons', 'Top-3 feature codes', 'Global SHAP summary']
  },
  response: {
    title: 'API response schema',
    body: 'Returns a JSON payload with three key fields: <strong>churn_probability</strong> (float 0–1), <strong>risk_tier</strong> (LOW / MEDIUM / HIGH based on probability thresholds 0.3 / 0.6), and <strong>reason_codes</strong> (list of top SHAP-derived feature explanations).',
    pills: ['churn_probability', 'risk_tier: LOW/MED/HIGH', 'reason_codes[]', 'response_time_ms']
  },
  prometheus: {
    title: 'Prometheus :9090',
    body: 'Scrapes the FastAPI <code>/metrics</code> endpoint every <strong>15 seconds</strong>. Tracked metrics include: <code>prediction_requests_total</code>, <code>prediction_latency_seconds</code> (histogram), <code>churn_score_distribution</code> (gauge), and <code>model_drift_score</code>. Data retained for 15 days.',
    pills: ['Scrape interval: 15s', 'Request counter', 'Latency histogram', 'Drift score gauge']
  },
  grafana: {
    title: 'Grafana :3000 (3 dashboards)',
    body: '<strong>Business Pulse:</strong> daily churn predictions, high-risk customer count, tier distribution. <strong>Model Health:</strong> rolling AUC (7-day), feature drift scores, prediction distribution shift. <strong>System Health:</strong> API request rate, P50/P95/P99 latency, error rate, Docker container CPU/memory.',
    pills: ['Business Pulse', 'Model Health', 'System Health', '3 dashboards']
  },
  alertmanager: {
    title: 'Alertmanager',
    body: 'Routes Prometheus alerts to configured receivers (Slack, email). Key alert rules: <strong>AUC drops below 0.82</strong> (critical, model degradation), <strong>P95 latency > 200ms</strong> (warning), <strong>error rate > 1%</strong> (critical), <strong>drift score > 0.15</strong> (warning, triggers retraining pipeline).',

  },
  lint: {
    title: 'Lint stage',
    body: 'Runs <code>flake8</code> for PEP8 style compliance and <code>mypy</code> for static type checking across the src/ directory. Fails the pipeline on any error. Ensures code quality gates before any heavier steps run, keeping CI fast.',

  },
  test: {
    title: 'Test stage',
    body: 'Runs <code>pytest</code> with coverage reporting. Test suite covers: unit tests for preprocessing functions, integration tests for the full sklearn pipeline (fixture data), API endpoint tests via <code>TestClient</code>, and a smoke test of model loading and inference.',

    pills: ['Blue-green deploy', 'Zero downtime', ':8000 port', 'Registry promotion']

function showPanel(key) {
  const d = panels[key];
  const pillColors = { ibm:'blue', preprocess:'blue', features:'purple', training:'purple', mlflow:'purple', registry:'purple', fastapi:'teal', sklearn:'teal', xgboost:'teal', shap:'teal', response:'teal', prometheus:'amber', grafana:'amber', alertmanager:'amber', lint:'coral', test:'coral', docker:'coral', gate:'coral', deploy:'coral' };
  const color = pillColors[key] || 'blue';
  const pillsHtml = (d.pills || []).map(p => `<span class="pill pill-${color}">${p}</span>`).join('');
  const panel = document.getElementById('info-panel');
  panel.style.display = 'block';
  panel.innerHTML = `<div class="panel-title">${d.title}</div><div>${d.body}</div><div style="margin-top:8px">${pillsHtml}</div>`;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
